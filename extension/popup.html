<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruthShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .shield-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .status {
      background: #1a1b23;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    .status.idle { border-color: #27272a; }
    .status.safe { border-color: #22c55e40; }
    .status.suspicious { border-color: #eab30840; }
    .status.high-risk { border-color: #ef444440; }
    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
      font-weight: 700;
    }
    .score-circle.safe { border-color: #22c55e; color: #22c55e; }
    .score-circle.suspicious { border-color: #eab308; color: #eab308; }
    .score-circle.high-risk { border-color: #ef4444; color: #ef4444; }
    .classification {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .classification.safe { color: #22c55e; }
    .classification.suspicious { color: #eab308; }
    .classification.high-risk { color: #ef4444; }
    .details {
      background: #1a1b23;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .details h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #71717a;
      margin-bottom: 10px;
    }
    .signal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
    }
    .signal + .signal { border-top: 1px solid #27272a; }
    .signal-bar {
      width: 60px;
      height: 6px;
      background: #27272a;
      border-radius: 3px;
      overflow: hidden;
    }
    .signal-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .signal-fill.low { background: #22c55e; }
    .signal-fill.med { background: #eab308; }
    .signal-fill.high { background: #ef4444; }
    .highlights {
      background: #1a1b23;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
    }
    .highlights h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #71717a;
      margin-bottom: 10px;
    }
    .highlights mark {
      background: #ef444430;
      color: #fca5a5;
      border-radius: 3px;
      padding: 1px 4px;
    }
    .idle-msg {
      color: #71717a;
      font-size: 13px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #27272a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg {
      color: #fca5a5;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="shield-icon">🛡️</div>
    <h1>TruthShield</h1>
  </div>

  <div id="status" class="status idle">
    <p class="idle-msg" id="idle-msg">Highlight text on any webpage, right-click, and select <strong>"Analyze with TruthShield"</strong> to begin.</p>
    <div id="loading" style="display:none;"><div class="spinner"></div><p style="font-size:13px;color:#71717a;">Analyzing...</p></div>
    <div id="result" style="display:none;">
      <div class="score-circle" id="score-circle">--</div>
      <div class="classification" id="classification">--</div>
    </div>
    <p id="error-msg"></p>
  </div>

  <div id="details-section" class="details" style="display:none;">
    <h3>Risk Signals</h3>
    <div class="signal">
      <span>AI Generated</span>
      <div class="signal-bar"><div class="signal-fill" id="ai-bar" style="width:0%"></div></div>
    </div>
    <div class="signal">
      <span>Scam Keywords</span>
      <div class="signal-bar"><div class="signal-fill" id="scam-bar" style="width:0%"></div></div>
    </div>
    <div class="signal">
      <span>Emotional Manipulation</span>
      <div class="signal-bar"><div class="signal-fill" id="emo-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div id="highlights-section" class="highlights" style="display:none;">
    <h3>Suspicious Phrases</h3>
    <div id="highlighted-text"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
