<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruthShield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Default (Dark) Theme ── */
    body {
      width: 400px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e4e4e7;
      padding: 16px;
      font-size: 13px;
    }

    /* ── Senior Mode ── */
    body.senior-mode {
      background: #ffffff;
      color: #1a1a1a;
      font-size: 16px;
      line-height: 1.7;
      width: 440px;
    }
    body.senior-mode .header h1 {
      font-size: 22px;
      background: none;
      -webkit-background-clip: unset;
      -webkit-text-fill-color: #1e40af;
    }
    body.senior-mode .shield-icon { background: #1e40af; }
    body.senior-mode .card { background: #f5f5f5; border-color: #d4d4d4; }
    body.senior-mode .idle-msg { color: #555; font-size: 15px; }
    body.senior-mode .signal { font-size: 15px; }
    body.senior-mode .classification { font-size: 18px; }
    body.senior-mode .tab-btn { font-size: 14px; padding: 8px 14px; }
    body.senior-mode .tab-btn.active { background: #1e40af; color: white; }
    body.senior-mode .explanation-item { font-size: 15px; }
    body.senior-mode .tip-text { font-size: 15px; }
    body.senior-mode mark { background: #fecaca; color: #991b1b; }
    body.senior-mode .score-circle { width: 90px; height: 90px; font-size: 32px; border-width: 5px; }
    body.senior-mode .toggle-row label { font-size: 14px; }

    /* ── Components ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .shield-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #22d3ee, #3b82f6);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .toggle-row {
      display: flex; align-items: center; gap: 6px;
    }
    .toggle-row label {
      font-size: 11px; color: #71717a; white-space: nowrap;
    }
    .toggle-switch {
      position: relative; width: 36px; height: 20px;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #27272a; border-radius: 10px;
      cursor: pointer; transition: 0.3s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 16px; height: 16px; border-radius: 50%;
      left: 2px; top: 2px;
      background: #71717a; transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider { background: #3b82f6; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); background: white; }

    .card {
      background: #1a1b23;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .card.safe { border-color: #22c55e40; }
    .card.suspicious { border-color: #eab30840; }
    .card.high-risk { border-color: #ef444440; }

    .score-circle {
      width: 80px; height: 80px; border-radius: 50%;
      border: 4px solid #27272a;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px; font-size: 28px; font-weight: 700;
    }
    .score-circle.safe { border-color: #22c55e; color: #22c55e; }
    .score-circle.suspicious { border-color: #eab308; color: #eab308; }
    .score-circle.high-risk { border-color: #ef4444; color: #ef4444; }

    .classification {
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      text-align: center; margin-bottom: 4px;
    }
    .classification.safe { color: #22c55e; }
    .classification.suspicious { color: #eab308; }
    .classification.high-risk { color: #ef4444; }

    .card h3 {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; color: #71717a; margin-bottom: 8px;
    }

    .signal {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0; font-size: 12px;
    }
    .signal + .signal { border-top: 1px solid #27272a; }
    body.senior-mode .signal + .signal { border-color: #e5e5e5; }
    .signal-bar {
      width: 60px; height: 6px;
      background: #27272a; border-radius: 3px; overflow: hidden;
    }
    body.senior-mode .signal-bar { background: #e5e5e5; }
    .signal-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .signal-fill.low { background: #22c55e; }
    .signal-fill.med { background: #eab308; }
    .signal-fill.high { background: #ef4444; }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 10px;
    }
    .tab-btn {
      flex: 1; padding: 6px 10px; font-size: 11px; font-weight: 600;
      border: 1px solid #27272a; background: transparent; color: #71717a;
      border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    body.senior-mode .tab-btn { border-color: #d4d4d4; color: #555; }
    .tab-btn:hover { background: #27272a20; }
    .tab-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Explanations */
    .explanation-item {
      padding: 8px; margin-bottom: 6px;
      border-radius: 8px; font-size: 12px;
    }
    .explanation-item.scam, .explanation-item.india_scam { background: #ef444415; border-left: 3px solid #ef4444; }
    .explanation-item.urgency { background: #eab30815; border-left: 3px solid #eab308; }
    .explanation-item.ai { background: #3b82f615; border-left: 3px solid #3b82f6; }
    .explanation-item .phrase { font-family: monospace; font-size: 11px; color: #a1a1aa; }
    .explanation-item .reason { margin-top: 4px; color: #a1a1aa; line-height: 1.5; }
    body.senior-mode .explanation-item .reason { color: #555; }
    .severity-badge {
      display: inline-block; font-size: 10px; padding: 1px 6px;
      border-radius: 4px; font-weight: 600; text-transform: uppercase;
    }
    .severity-badge.low { background: #22c55e30; color: #22c55e; }
    .severity-badge.medium { background: #eab30830; color: #eab308; }
    .severity-badge.high { background: #ef444430; color: #ef4444; }
    body.senior-mode .severity-badge.low { background: #dcfce7; color: #166534; }
    body.senior-mode .severity-badge.medium { background: #fef9c3; color: #854d0e; }
    body.senior-mode .severity-badge.high { background: #fecaca; color: #991b1b; }

    /* Tips */
    .tip-item {
      display: flex; gap: 6px; padding: 4px 0; font-size: 12px; color: #a1a1aa;
    }
    body.senior-mode .tip-item { color: #555; }
    .tip-item::before { content: '💡'; }

    /* Summary */
    .summary-box {
      padding: 10px; border-radius: 8px;
      background: #3b82f610; border: 1px solid #3b82f630;
      font-size: 12px; line-height: 1.6; color: #a1a1aa; margin-bottom: 10px;
    }
    body.senior-mode .summary-box { background: #eff6ff; border-color: #bfdbfe; color: #1e3a5f; }

    .highlights mark {
      background: #ef444430; color: #fca5a5;
      border-radius: 3px; padding: 1px 4px;
    }
    body.senior-mode .highlights mark { background: #fecaca; color: #991b1b; }

    .idle-msg { color: #71717a; font-size: 12px; text-align: center; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #27272a; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg { color: #fca5a5; font-size: 12px; margin-top: 8px; display: none; }

    .btn-clear {
      width: 100%; margin-top: 10px; padding: 8px;
      background: #27272a; color: #a1a1aa;
      border: 1px solid #3f3f46; border-radius: 8px;
      cursor: pointer; font-size: 12px; transition: background 0.2s;
    }
    .btn-clear:hover { background: #3f3f46; }
    body.senior-mode .btn-clear { background: #e5e5e5; color: #333; border-color: #d4d4d4; font-size: 14px; padding: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="shield-icon">🛡️</div>
      <h1>TruthShield</h1>
    </div>
    <div class="toggle-row">
      <label>👴 Senior</label>
      <div class="toggle-switch">
        <input type="checkbox" id="senior-toggle" />
        <span class="toggle-slider"></span>
      </div>
    </div>
  </div>

  <div id="status" class="card" style="text-align:center;">
    <p class="idle-msg" id="idle-msg">Highlight text on any webpage, right-click, and select <strong>"Analyze with TruthShield"</strong> to begin.</p>
    <div id="loading" style="display:none;"><div class="spinner"></div><p style="font-size:12px;color:#71717a;">Analyzing...</p></div>
    <div id="result" style="display:none;">
      <div class="score-circle" id="score-circle">--</div>
      <div class="classification" id="classification">--</div>
      <div id="senior-verdict" style="display:none;font-size:15px;font-weight:600;margin-top:6px;"></div>
    </div>
    <p id="error-msg"></p>
  </div>

  <div id="tabs-container" style="display:none;">
    <div class="tabs">
      <button class="tab-btn active" data-tab="signals">Signals</button>
      <button class="tab-btn" data-tab="explain">Why?</button>
      <button class="tab-btn" data-tab="highlights">Flagged</button>
      <button class="tab-btn" data-tab="tips">Tips</button>
    </div>

    <div class="tab-content active" id="tab-signals">
      <div class="card">
        <h3>Risk Signals</h3>
        <div class="signal"><span>🤖 AI Generated</span><div class="signal-bar"><div class="signal-fill" id="ai-bar" style="width:0%"></div></div></div>
        <div class="signal"><span>🎣 Scam Keywords</span><div class="signal-bar"><div class="signal-fill" id="scam-bar" style="width:0%"></div></div></div>
        <div class="signal"><span>😰 Manipulation</span><div class="signal-bar"><div class="signal-fill" id="emo-bar" style="width:0%"></div></div></div>
      </div>
    </div>

    <div class="tab-content" id="tab-explain">
      <div id="summary-container" class="summary-box" style="display:none;"></div>
      <div id="explanations-container"></div>
    </div>

    <div class="tab-content" id="tab-highlights">
      <div class="card highlights">
        <h3>Suspicious Phrases</h3>
        <div id="highlighted-text" style="line-height:1.7;"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-tips">
      <div class="card">
        <h3>Safety Tips</h3>
        <div id="tips-container"></div>
      </div>
    </div>
  </div>

  <button id="clear-btn" class="btn-clear" style="display:none;">Clear Results</button>

  <script src="popup.js"></script>
</body>
</html>
